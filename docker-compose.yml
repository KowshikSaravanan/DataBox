version: '3'
services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data

  webserver:
    image: apache/airflow:latest
    depends_on:
      - postgres
    environment:
      AIRFLOW_CORE_SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW_CORE_EXECUTOR: LocalExecutor
      AIRFLOW_WEBSERVER_EXPOSE_CONFIG: "True"
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags

  scheduler:
    image: apache/airflow:latest
    depends_on:
      - postgres
    environment:
      AIRFLOW_CORE_SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW_CORE_EXECUTOR: LocalExecutor
    volumes:
      - ./dags:/opt/airflow/dags

  dbt:
    image: fishtownanalytics/dbt:latest
    depends_on:
      - postgres
    environment:
      DBT_PROFILES_DIR: /dbt
      DBT_PROFILES_DIR_PROFILES_YML: |
        default:
          outputs:
            dev:
              type: postgres
              threads: 1
              host: postgres
              user: airflow
              pass: airflow
              port: 5432
              dbname: airflow
              schema: public
          target: dev
      DBT_PROJECT_DIR: /dbt
    volumes:
      - ./dbt:/dbt
      - ./models:/dbt/models
      - ./data:/dbt/data

volumes:
  postgres_data: